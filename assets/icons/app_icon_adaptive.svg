<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle drop shadow for the R -->
    <filter id="rShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.20"/>
    </filter>

    <!-- Recording dot gradient — warm coral to red -->
    <radialGradient id="dotGradient" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </radialGradient>
  </defs>

  <!-- Transparent background — Android supplies the adaptive background color -->

  <!-- Geometric "R" — white, matching main icon geometry -->
  <g filter="url(#rShadow)" transform="translate(512, 512)">
    <path d="
      M -200 -265
      L 60 -265
      C 140 -265, 200 -225, 200 -140
      C 200 -65, 150 -15, 90 5
      L 280 265
      L 170 265
      L -10 18
      L -110 18
      L -110 265
      L -200 265
      Z
      M -110 -185
      L 50 -185
      C 105 -185, 130 -162, 130 -135
      C 130 -108, 105 -68, 50 -68
      L -110 -68
      Z
    " fill="#FFFFFF" fill-rule="evenodd"/>
  </g>

  <!-- Recording dot — warm coral-red -->
  <circle cx="785" cy="770" r="38" fill="url(#dotGradient)" stroke="#FFFFFF" stroke-width="4"/>
</svg>
