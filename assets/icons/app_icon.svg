<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep, rich background gradient — evolved from blue-teal-emerald to a deeper, more premium palette -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="45%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Radial glow overlay — creates depth and "light from within" effect -->
    <radialGradient id="centerGlow" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>

    <!-- Recording dot gradient — warm coral to red -->
    <radialGradient id="dotGradient" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </radialGradient>

    <!-- Subtle drop shadow for the R -->
    <filter id="rShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <!-- Recording dot outer glow -->
    <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Background: Rounded square with Material Design 3 corner radius -->
  <rect x="32" y="32" width="960" height="960" rx="220" fill="url(#bgGradient)"/>

  <!-- Depth glow overlay -->
  <rect x="32" y="32" width="960" height="960" rx="220" fill="url(#centerGlow)"/>

  <!-- Geometric "R" — clean, modern, properly constructed lettermark -->
  <g filter="url(#rShadow)" transform="translate(512, 512)">
    <path d="
      M -200 -265
      L 60 -265
      C 140 -265, 200 -225, 200 -140
      C 200 -65, 150 -15, 90 5
      L 280 265
      L 170 265
      L -10 18
      L -110 18
      L -110 265
      L -200 265
      Z
      M -110 -185
      L 50 -185
      C 105 -185, 130 -162, 130 -135
      C 130 -108, 105 -68, 50 -68
      L -110 -68
      Z
    " fill="#FFFFFF" fill-rule="evenodd"/>
  </g>

  <!-- Recording dot glow (soft halo) -->
  <circle cx="785" cy="770" r="48" fill="#fb923c" opacity="0.35" filter="url(#dotGlow)"/>

  <!-- Recording dot — warm coral-red with white ring -->
  <circle cx="785" cy="770" r="38" fill="url(#dotGradient)" stroke="#FFFFFF" stroke-width="5"/>
</svg>
